<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wimpie Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="text-slate-800 pb-20">

    <header
        class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Wimpie Admin</h1>
            <p class="text-xs text-slate-500">Dagbesteding & Muziek</p>
        </div>
        <div id="statusIndicator" class="w-3 h-3 rounded-full bg-red-400"></div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">

        <div class="flex p-1 bg-slate-200 rounded-xl mb-6">
            <button onclick="switchTab('presence')" id="tab-presence"
                class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm transition-all">Aanwezigheid</button>
            <button onclick="switchTab('reports')" id="tab-reports"
                class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 transition-all">Verslag</button>
            <button onclick="switchTab('export')" id="tab-export"
                class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 transition-all">Export</button>
        </div>

        <div id="view-presence" class="space-y-4">
            <div class="ios-card p-4">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Datum</label>
                <input type="date" id="presenceDate"
                    class="w-full bg-slate-100 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div id="participantsList" class="space-y-3">
                <div class="text-center py-8 text-slate-400">Wachten op toegang...</div>
            </div>

            <button onclick="saveAttendance()" id="btn-save-attendance"
                class="ios-btn w-full bg-blue-600 text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-200">
                Opslaan
            </button>
        </div>

        <div id="view-reports" class="hidden space-y-4">
            <div class="ios-card p-4 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Datum</label>
                    <input type="date" id="reportDate"
                        class="w-full bg-slate-100 rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Deelnemer</label>
                    <select id="reportParticipant"
                        class="w-full bg-slate-100 rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500">
                        <option>Selecteer...</option>
                    </select>
                </div>

                <div id="historyContainer" class="hidden">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Eerdere Verslagen</label>
                    <div id="historyList" class="flex flex-wrap gap-2">
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Verslag</label>
                    <textarea id="reportText" rows="8"
                        class="w-full bg-slate-100 rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="Selecteer eerst een deelnemer..."></textarea>
                    <div id="reportLoading" class="hidden absolute top-8 right-2">
                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin text-slate-400"></i>
                    </div>
                </div>
            </div>
            <button onclick="saveReport()" id="btn-save-report"
                class="ios-btn w-full bg-green-600 text-white font-semibold py-4 rounded-xl shadow-lg shadow-green-200">
                Verslag Versturen
            </button>
        </div>

        <div id="view-export" class="hidden space-y-4">
            <div class="ios-card p-6 space-y-6">
                <div>
                    <h2 class="text-lg font-bold text-slate-800">Urenverantwoording Downloaden</h2>
                    <p class="text-sm text-slate-500 mb-4">Genereer direct de Excel (CSV) bestanden in het juiste format
                        voor Cordaan en Amsta.</p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Selecteer Maand</label>
                    <input type="month" id="exportMonth"
                        class="w-full bg-slate-100 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="space-y-3 pt-2">
                    <button onclick="downloadExport('cordaan')"
                        class="w-full flex items-center justify-between p-4 bg-orange-50 text-orange-700 rounded-xl border border-orange-200 hover:bg-orange-100 transition-colors">
                        <span class="font-bold">Cordaan Export (.csv)</span>
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button onclick="downloadExport('amsta')"
                        class="w-full flex items-center justify-between p-4 bg-purple-50 text-purple-700 rounded-xl border border-purple-200 hover:bg-purple-100 transition-colors">
                        <span class="font-bold">Amsta Export (.csv)</span>
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button onclick="downloadExport('Thomashuis')"
                        class="w-full flex items-center justify-between p-4 bg-yellow-50 text-yellow-700 rounded-xl border border-yellow-200 hover:bg-yellow-100 transition-colors">
                        <span class="font-bold">Thomashuis Factuur (.pdf)</span>
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                    </button>
                </div>

                <div id="exportStatus" class="text-center text-sm font-medium text-slate-600 hidden">
                    Gegevens ophalen...
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="app.js"></script>
</body>

</html>
